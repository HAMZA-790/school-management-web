{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-5">
    <h2 class="fw-bold m-0">Overview</h2>
    <div class="text-muted small">{{ now }}</div>
</div>

<div class="row g-4">
    <div class="col-md-4">
        <div class="card h-100 border-0" style="background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between mb-4">
                    <div class="rounded-circle bg-white p-3 shadow-sm d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                        <i class="bi bi-people-fill text-primary fs-3"></i>
                    </div>
                </div>
                <h6 class="text-muted fw-semibold mb-1">Total Students</h6>
                <h2 class="display-5 fw-bold text-primary m-0">{{ total_students }}</h2>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card h-100 border-0" style="background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between mb-4">
                    <div class="rounded-circle bg-white p-3 shadow-sm d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                        <i class="bi bi-person-badge-fill text-success fs-3"></i>
                    </div>
                </div>
                <h6 class="text-muted fw-semibold mb-1">Total Teachers</h6>
                <h2 class="display-5 fw-bold text-success m-0">{{ total_teachers }}</h2>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card h-100 border-0" style="background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%);">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between mb-4">
                    <div class="rounded-circle bg-white p-3 shadow-sm d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                        <i class="bi bi-cash-stack text-warning fs-3"></i>
                    </div>
                </div>
                <h6 class="text-muted fw-semibold mb-1">Total Fees Collected</h6>
                <h2 class="display-5 fw-bold text-warning m-0">PKR {{ total_fees|round(0) }}</h2>
            </div>
        </div>
    </div>
</div>

{% endblock %}
