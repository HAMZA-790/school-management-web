{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-5">
    <h2 class="fw-bold m-0">Manage Students</h2>
    <button class="btn btn-primary px-4 py-2" data-bs-toggle="modal" data-bs-target="#addStudentModal">
        <i class="bi bi-person-plus-fill me-2"></i> Add New Student
    </button>
</div>

<div class="card border-0">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light text-muted small text-uppercase fw-bold">
                    <tr>
                        <th class="ps-4 py-3">ID</th>
                        <th class="py-3">Name</th>
                        <th class="py-3">Class</th>
                        <th class="py-3">Age</th>
                        <th class="py-3 text-end pe-4">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for student in students %}
                    <tr>
                        <td class="ps-4"><span class="badge bg-light text-dark fw-normal border">#{{ student.id }}</span></td>
                        <td class="fw-semibold">{{ student.name }}</td>
                        <td><span class="badge bg-info-subtle text-info border border-info-subtle px-3">{{ student.student_class }}</span></td>
                        <td>{{ student.age }} years</td>
                        <td class="text-end pe-4">
                            <form method="POST" class="d-inline">
                                <input type="hidden" name="action" value="delete">
                                <input type="hidden" name="student_id" value="{{ student.id }}">
                                <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="return confirm('Are you sure you want to delete this student?')">
                                    <i class="bi bi-trash3"></i> Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>


<!-- Add Student Modal -->
<div class="modal fade" id="addStudentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow" style="border-radius: 24px;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Add Student</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST">
                <div class="modal-body p-4">
                    <input type="hidden" name="action" value="add">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Full Name</label>
                        <input type="text" name="name" class="form-control bg-light border-0" placeholder="e.g. Muhammad Ali" required minlength="2" style="padding: 0.75rem; border-radius: 12px;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Class</label>
                        <input type="text" name="class" class="form-control bg-light border-0" placeholder="e.g. 10th" required style="padding: 0.75rem; border-radius: 12px;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Age</label>
                        <input type="number" name="age" class="form-control bg-light border-0" placeholder="e.g. 15" required min="3" max="100" style="padding: 0.75rem; border-radius: 12px;">
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary rounded-pill px-4">Create Student</button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
